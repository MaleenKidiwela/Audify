<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Audify</title>
<style>
  :root { color-scheme: light dark; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 100vh; margin: 0; gap: 14px;
  }
  h1 { font-size: 1.6rem; margin: 0; }
  p { color: #888; margin: 0; }
  .dot { animation: blink 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%, 60%, 100% { opacity: 0.2; } 30% { opacity: 1; } }
</style>
</head>
<body>
<!-- Splash only: the Rust side navigates to the engine UI once the
     local speech engine is listening. -->
<h1>Audify</h1>
<p>starting local speech engine<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></p>
</body>
</html>
